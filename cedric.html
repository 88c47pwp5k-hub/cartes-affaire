<meta name="mobile-web-app-capable" content="yes">

<title>Carte d'affaire - Cedric Rainville</title>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a0a;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 100vh;
    padding: 16px;
    box-sizing: border-box;
  }
  .card {
    background: #111111;
    border: 1px solid #C68B00;
    border-radius: 18px;
    width: 380px;
    max-width: 100%;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .photo-wrap {
    width:100%;
    height: 452px;
    overflow:hidden;
    position:relative;
    background:#000;
  }
  .photo-wrap img {
    width:100%;
    height:100%;
    object-fit:cover;
    object-position: center center;
    display:block;
  }
  .photo-wrap::after {
    content:"";
    position:absolute;
    bottom:0; left:0; right:0;
    height:80px;
    background: linear-gradient(to top, #111111, transparent);
  }
  .content {
    padding: 20px 24px 24px;
  }
  .name {
    color:#FFFFFF;
    font-size: 24px;
    font-weight:700;
    letter-spacing: 0.3px;
  }
  .title {
    color:#C68B00;
    font-size: 14px;
    font-weight:600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top:4px;
    margin-bottom: 16px;
  }
  .divider {
    height:1px;
    background: linear-gradient(to right, #C68B00, transparent);
    margin-bottom:16px;
  }
  .row {
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom: 10px;
    color:#e6e6e6;
    font-size: 13.5px;
  }
  .row .icon {
    color:#C68B00;
    width:18px;
    text-align:center;
    flex-shrink:0;
  }
  .logo-row {
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #2a2a2a;
  }
  .brand img {
    height: 46px;
    width: auto;
    display:block;
  }
  .brand .sub {
    display:block;
    color:#888;
    font-size: 9.5px;
    font-weight:400;
    letter-spacing: 1.5px;
    margin-top: 6px;
  }
  #qrcode {
    background:#fff;
    padding: 6px;
    border-radius: 8px;
    line-height:0;
    width: 84px;
    height: 84px;
    display:block;
  }
  .hint {
    text-align:center;
    color:#666;
    font-size: 11px;
    margin-top: 14px;
    letter-spacing: 0.3px;
  }
  .partners {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid #2a2a2a;
  }
  .partners .partners-label {
    text-align:center;
    color:#666;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .partners-row {
    display:flex;
    flex-wrap: wrap;
    align-items:center;
    justify-content:center;
    gap: 6px;
    row-gap: 8px;
  }
  .partners-row .chip {
    background:#fff;
    border-radius: 6px;
    padding: 6px 8px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex-shrink: 0;
  }
  .partners-row .chip img {
    height: 20px;
    width: auto;
    display:block;
  }
</style>
</head>
